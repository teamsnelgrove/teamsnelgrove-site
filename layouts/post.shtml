<extend template="base.shtml">
<head id="head"></head>
<body id="body">
	<h1 :text="$page.title"></h1>
	<div class="post copy-content" :html="$page.content()"></div>
	<div id="prev-next">
		<div :if="$page.prevPage?()">
			<a href="$if.link()">
				←
				<span :text="$if.title"></span>
			</a>
		</div>
		<div :if="$page.nextPage?()">
			<a href="$if.link()">
				<span :text="$if.title"></span>
				→
			</a>
		</div>
	</div>
</body>
