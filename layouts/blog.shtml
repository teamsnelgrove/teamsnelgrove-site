<extend template="base.shtml">
<head id="head"></head>
<body id="body">
	<section>
		<h1 class="writings-title" :text="$page.title"></h1>
		<ul class="post-list" :loop="$page.subpages()">
			<li>
				<a class="title" href="$loop.it.link()" :text="$loop.it.title"></a>
				<span class="leader" aria-hidden="true"></span>
				<time class="date" :text="$loop.it.date.format('Jan 2006')"></time>
			</li>
		</ul>
	</section>
</body>
